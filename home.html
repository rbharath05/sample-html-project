<!DOCTYPE html>
<html>
<head>
<style>
.container {
  position: relative;
  width: 300px;
}

.image {
  width: 100%;
  display: block;
  transition: 0.5s ease;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.6);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: 0.5s ease;
}

.container:hover .overlay {
  opacity: 1;
}
</style>
</head>
<body>

<div class="container">
  <img src="download.jpg" class="image" alt="Image">
  <div class="overlay">Hovered Text</div>
</div>

</body>
</html>
