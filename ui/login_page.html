<!DOCTYPE html>
<html lang="en">
<head>
    <title>LogIn page</title>
    <link rel="stylesheet" href="../css/web.css">
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="../images/Logo.webp" alt="Logo">
        </div>
        <h2>Welcome back</h2>

        <p>Please enter your unique ID to access your account</p>

        <div class="id">
            <input type="text" placeholder="Member ID">
        </div>

        
        <button class="cont-btn">Continue</button>

        <div class="forget-link">
            <a href="#">Forget Member ID?</a>
        </div>
        
        <div class="hor-line">
            <span></span>
            <p>OR</p>
            <span></span>
        </div>

        <button class="new-btn">Create New Account</button>
        <div class="foot">
            <footer>
                <p>Secure encrypted connection</p>
            </footer>
        </div>       
    </div>
</body>
</html>
