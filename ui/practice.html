<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Card</title>
    <link rel="stylesheet" href="../css/sample.css">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="card">

        <div class="logo">
            <img src="https://picsum.photos/80" alt="Logo">
        </div>

        <h1>Welcome Back</h1>

        <p class="subtitle">
            Please enter your unique ID to access your account
        </p>

        <div class="input-box">
            <i class="fa-regular fa-user"></i>
            <input type="text" placeholder="Member ID">
        </div>

        <button class="continue-btn">
            Continue <i class="fa-solid fa-arrow-right"></i>
        </button>

        <a href="#" class="forgot-link">Forgot Member ID?</a>

        <div class="divider">
            <span></span>
            <p>OR</p>
            <span></span>
        </div>

        <button class="create-btn">
            Create New Account
        </button>

        <div class="footer">
            <i class="fa-solid fa-lock"></i>
            <p>Secure encrypted connection</p>
        </div>

    </div>

</body>
</html>
